version: 2.1
jobs:  
  deploy:
    docker:
      - image: 'cimg/ruby:3.2'  
    steps:
      - checkout
      - run:
          name: apt install
          command: |
            apt-get update \
                && apt-get install -y --no-install-recommends \
                    build-essential \
                    git \
                && gem install bundler -v 2.4.22 \
                && bundle install
      - run:
          name: install nodejs
          command: |
            curl -fsSL https://deb.nodesource.com/setup_20.x | sudo bash -
            sudo apt-get install -y nodejs
      - run:
          name: verify versions
          command: node --version && npm --version
      - run:
          name: install widdershins
          command: npm install -g widdershins
      - run:
          name: add permission
          command: chmod +x deploy.sh
      - run:
          name: deploy slate
          command: ./deploy.sh --gen-widdershins
      - run:
          name: deploy
          command: ./deploy.sh

workflows:
  version: 2
  build-and-deploy:
    jobs:
      - deploy:
          name: deploy slate
          filters:
            branches:
              only:
                - master
                - slate-global/nodejs-upgrade
